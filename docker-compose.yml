services:

  joomla:
    container_name: joomla
    build:
      context: .
      dockerfile: Dockerfile
      args:
        JOOMLA_TAG: ${JOOMLA_TAG:-5}
        PHP_VERSION: ${PHP_VERSION:-8.3}
        ARG_UID: ${ENV_UID:-1000}
        ARG_GID: ${ENV_GID:-1000}
    restart: unless-stopped
    depends_on:
      - mysql
    ports:
      - "8080:80"

    environment:
      # DB credentials (root/asdf) jsou taky hardcoded v některých skriptech
      # (db-snapshot, db-restore, reinstall-module, configure-vm-after-install).
      # Než FOLLOWUPS #3 (pull-from-.env) doběhne, ZMĚNA HESLA TADY ROZBIJE TY
      # SKRIPTY. Kompletní seznam míst je v .notes/FOLLOWUPS.md #3.
      JOOMLA_DB_HOST: dev_db
      JOOMLA_DB_USER: root
      JOOMLA_DB_PASSWORD: asdf
      JOOMLA_DB_NAME: joomla
      JOOMLA_SITE_NAME: ${JOOMLA_SITE_NAME:-VirtueMart Dev}
      JOOMLA_ADMIN_USER: ${JOOMLA_ADMIN_USER:-Admin}
      JOOMLA_ADMIN_USERNAME: ${JOOMLA_ADMIN_USERNAME:-admin}
      # Joomla image vyžaduje heslo *delší* než 12 znaků, jinak auto-install spadne.
      JOOMLA_ADMIN_PASSWORD: ${JOOMLA_ADMIN_PASSWORD:-adminadmin1234}
      JOOMLA_ADMIN_EMAIL: ${JOOMLA_ADMIN_EMAIL:-admin@example.com}

      # PhpStorm CLI debug
      PHP_IDE_CONFIG: "serverName=virtuemart.local"

    volumes:
      - ./src:/var/www/html
      - ./xdebug.ini:/usr/local/etc/php/conf.d/xdebug.ini
      - ./php.ini:/usr/local/etc/php/conf.d/zz-custom.ini

      # Modul Packeta pro buildění zipu / composer / lint (analogie packetery-dev z ps8-docker)
      - type: bind
        source: ./modules/packeta
        target: /var/www/packeta-dev

      # Live bind pro plugin (jeho kořenové soubory: zasilkovna.php / .xml / install.sql).
      # Změna PHP v rootu modulu je okamžitě live. Reinstall je třeba při změně
      # manifestu (`zasilkovna.xml`) nebo `install.sql`.
      - type: bind
        source: ./modules/packeta
        target: /var/www/html/plugins/vmshipment/zasilkovna

      # Live bind admin-side souborů modulu, které `install.zasilkovna.php` přes
      # `recurse_copy` rozkopírovává do VM admin tree mimo plugin folder.
      # Bez těchto bindů by editace odkrývaných souborů vyžadovala
      # `./scripts/reinstall-module.sh` po každé změně.
      # Při reinstallu pack-module.sh pakuje ze zdroje, takže recurse_copy zapisuje
      # source → media → source (přes bind mount) — net efekt žádný, bezpečné.
      #
      # POZN: Bindujeme JEN celé adresáře, ne jednotlivé soubory. Docker Desktop
      # na macOS (virtiofs) neumí vytvořit file mountpoint, když cílový soubor
      # ještě neexistuje (u prvního up.sh před prvním install-module to neexistuje).
      # Adresářové mountpointy si Docker vytvoří sám.
      # Soubory pod admin/com_virtuemart/ MIMO tyto dva adresáře (controllers/zasilkovna.php,
      # models/zasilkovna.php, models/zasilkovna_orders.php, models/rules/minvalue.php,
      # fields/vmzasilkovna*.php, lang ini) pořád vyžadují reinstall — méně časté
      # ediční hot spoty.
      - type: bind
        source: ./modules/packeta/media/admin/com_virtuemart/views/zasilkovna
        target: /var/www/html/administrator/components/com_virtuemart/views/zasilkovna
      - type: bind
        source: ./modules/packeta/media/admin/com_virtuemart/models/zasilkovna_src
        target: /var/www/html/administrator/components/com_virtuemart/models/zasilkovna_src

    networks:
      - vm_network

  mysql:
    container_name: dev_db
    image: mariadb:12
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: joomla
      # Heslo `asdf` je taky hardcoded ve scriptech sahájících do DB —
      # neměň bez současné úpravy v FOLLOWUPS #3 seznamu míst.
      MARIADB_ROOT_PASSWORD: asdf
      TZ: Europe/Prague
    volumes:
      - ./db:/var/lib/mysql
    ports:
      - "3308:3306"
    networks:
      - vm_network

  adminer:
    image: adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    networks:
      - vm_network

  mailpit:
    image: axllent/mailpit
    container_name: mailpit
    restart: unless-stopped
    volumes:
      - ./mailpit:/data
    ports:
      - "8025:8025"
      - "1025:1025"
    environment:
      MP_MAX_MESSAGES: 5000
      MP_DATABASE: /data/mailpit.db
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks:
      - vm_network

networks:
  vm_network:
