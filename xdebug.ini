; Registraci `zend_extension=xdebug.so` řeší `docker-php-ext-enable xdebug`
; z Dockerfile (vytvoří `/usr/local/etc/php/conf.d/docker-php-ext-xdebug.ini`).
; Tady jsou jen settings — duplicitní `zend_extension=` by způsoboval
; warning `Cannot load Xdebug - it was already loaded` na každém PHP CLI volání.

[xdebug]
xdebug.mode=debug
xdebug.client_host=host.docker.internal
xdebug.start_with_request=trigger
xdebug.discover_client_host=1
